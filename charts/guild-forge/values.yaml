# Guild Forge Helm Values
# Default configuration for local development (minikube / kind / k3d)

global:
  imageRegistry: ""
  imagePullSecrets: []

# PostgreSQL (built-in StatefulSet using official postgres image)
postgresql:
  enabled: true
  image:
    tag: "17-alpine"  # pin to major; use "latest" only for local dev
  auth:
    username: "guild"
    password: "guild"
    database: "guild"
  persistence:
    size: 1Gi
  resources:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 100m

# Shared image settings — override per-service image.repository if needed
imageTag: "latest"
imagePullPolicy: IfNotPresent

# Queue Service
queueService:
  enabled: true
  replicaCount: 1
  image:
    repository: guild-forge/queue-service
  resources:
    limits:
      memory: 256Mi
      cpu: 200m
    requests:
      memory: 128Mi
      cpu: 50m
  config:
    poolSize: "10"
    archiveCompletedAfterSeconds: "3600"

# Webhook Gateway
webhookGateway:
  enabled: true
  replicaCount: 1
  image:
    repository: guild-forge/webhook-gateway
  resources:
    limits:
      memory: 256Mi
      cpu: 200m
    requests:
      memory: 128Mi
      cpu: 50m

# Registry
registry:
  enabled: true
  replicaCount: 1
  image:
    repository: guild-forge/registry
  resources:
    limits:
      memory: 256Mi
      cpu: 200m
    requests:
      memory: 128Mi
      cpu: 50m

# Dispatcher (worker — no HTTP server)
dispatcher:
  enabled: true
  replicaCount: 1
  image:
    repository: guild-forge/dispatcher
  resources:
    limits:
      memory: 256Mi
      cpu: 200m
    requests:
      memory: 128Mi
      cpu: 50m
  config:
    pollIntervalMs: "1000"

# Scheduler
scheduler:
  enabled: true
  replicaCount: 1
  image:
    repository: guild-forge/scheduler
  resources:
    limits:
      memory: 128Mi
      cpu: 100m
    requests:
      memory: 64Mi
      cpu: 25m
  config:
    refreshIntervalMs: "300000"

# Agent Executor
agentExecutor:
  enabled: true
  replicaCount: 1
  image:
    repository: guild-forge/agent-executor
  resources:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 100m
  config:
    pollIntervalMs: "1000"
    # Comma-separated "name:chapter" pairs — must match seeded manifests
    agentQueues: "quartermaster:__global,sentinel:__global,ranger:__global,scribe:__global,grandmaster:__global"
    # JSON array of MCP servers: '[{"name":"jira","url":"http://..."}]'
    mcpServers: ""
    # LLM provider: "anthropic" (default) or "ollama"
    llmProvider: "anthropic"
    # Anthropic settings (used when llmProvider=anthropic)
    anthropicModel: "claude-haiku-4-5-20251001"
    # Ollama settings (used when llmProvider=ollama)
    # embeddedOllama=true  → uses the combined agent-executor+Ollama image (model baked in at build time)
    #                        Set OLLAMA_BASE_URL=http://localhost:11434 automatically, no separate Pod needed.
    # embeddedOllama=false → use ollama.enabled=true for in-cluster Pod, or ollamaBaseUrl for external host
    embeddedOllama: false
    ollamaBaseUrl: "http://host.minikube.internal:11434"
    ollamaModel: "qwen2.5:3b"

# Ollama — standalone in-cluster LLM server (no API key needed)
# Not needed when agentExecutor.config.embeddedOllama=true (model is baked into the executor image).
# Models with good tool-calling support: qwen2.5:3b (~2GB), qwen2.5:7b (~4.5GB), llama3.1:8b (~5GB)
ollama:
  enabled: false
  image:
    tag: "latest"
  model: "qwen2.5:3b"
  persistence:
    size: 10Gi
  resources:
    limits:
      memory: 8Gi
      cpu: 4000m
    requests:
      memory: 4Gi
      cpu: 500m

# Seed Job — one-shot Job that loads agent manifests into the registry
seedJob:
  enabled: true
  backoffLimit: 4

# Ingress for the Webhook Gateway (legacy — prefer gateway below for new setups)
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  host: guild-forge.local
  tls: false
  tlsSecret: guild-forge-tls

# Gateway API — single entry point for both dashboard and webhook gateway.
# Prerequisites (run once):
#   kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml
#   minikube addons enable ingress
#   minikube tunnel   # in a separate terminal — exposes LoadBalancer → 127.0.0.1
#
# Then deploy with:
#   --set gateway.enabled=true
#
# After deploy: open http://localhost/ (dashboard) or http://localhost/webhooks/... (webhook-gateway)
gateway:
  enabled: false
  className: eg      # GatewayClass name: "eg" (Envoy Gateway), "cilium", "nginx" (nginx-gateway-fabric)
  host: ""           # empty = match all hostnames; set e.g. "guild.local" for host-based routing

# Debug Dashboard — lightweight read-only view of queues, registry, and events
debugDashboard:
  enabled: true
  image:
    repository: guild-forge/debug-dashboard
    tag: latest
  service:
    port: 3333

# Secrets — pass via --set or a separate values file; never commit real values
secrets:
  anthropicApiKey: ""
