{{- if .Values.scheduler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "guild-forge.fullname" . }}-scheduler
  labels:
    {{- include "guild-forge.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  replicas: {{ .Values.scheduler.replicaCount }}
  selector:
    matchLabels:
      {{- include "guild-forge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        {{- include "guild-forge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: scheduler
    spec:
      containers:
        - name: scheduler
          image: "{{ .Values.scheduler.image.repository }}:{{ .Values.imageTag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: QUEUE_SERVICE_URL
              value: {{ include "guild-forge.queueServiceUrl" . | quote }}
            - name: REGISTRY_URL
              value: {{ include "guild-forge.registryUrl" . | quote }}
            - name: REFRESH_INTERVAL_MS
              value: {{ .Values.scheduler.config.refreshIntervalMs | quote }}
          resources:
            {{- toYaml .Values.scheduler.resources | nindent 12 }}
{{- end }}
