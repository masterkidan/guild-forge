{{- if .Values.agentExecutor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "guild-forge.fullname" . }}-agent-executor
  labels:
    {{- include "guild-forge.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-executor
spec:
  replicas: {{ .Values.agentExecutor.replicaCount }}
  selector:
    matchLabels:
      {{- include "guild-forge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent-executor
  template:
    metadata:
      labels:
        {{- include "guild-forge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent-executor
    spec:
      containers:
        - name: agent-executor
          image: "{{ .Values.agentExecutor.image.repository }}:{{ .Values.imageTag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: QUEUE_SERVICE_URL
              value: {{ include "guild-forge.queueServiceUrl" . | quote }}
            - name: REGISTRY_URL
              value: {{ include "guild-forge.registryUrl" . | quote }}
            - name: AGENT_QUEUES
              value: {{ .Values.agentExecutor.config.agentQueues | quote }}
            - name: POLL_INTERVAL_MS
              value: {{ .Values.agentExecutor.config.pollIntervalMs | quote }}
            {{- if .Values.agentExecutor.config.mcpServers }}
            - name: MCP_SERVERS
              value: {{ .Values.agentExecutor.config.mcpServers | quote }}
            {{- end }}
            - name: LLM_PROVIDER
              value: {{ .Values.agentExecutor.config.llmProvider | default "anthropic" | quote }}
            {{- if eq (.Values.agentExecutor.config.llmProvider | default "anthropic") "anthropic" }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "guild-forge.fullname" . }}-secrets
                  key: anthropicApiKey
            - name: ANTHROPIC_MODEL
              value: {{ .Values.agentExecutor.config.anthropicModel | default "claude-haiku-4-5-20251001" | quote }}
            {{- else }}
            - name: OLLAMA_BASE_URL
              value: {{ include "guild-forge.ollamaUrl" . | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.ollama.model | default .Values.agentExecutor.config.ollamaModel | default "qwen2.5:3b" | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.agentExecutor.resources | nindent 12 }}
{{- end }}
