{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "guild-forge.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "guild-forge.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className | default "eg" | quote }}
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      {{- if .Values.gateway.host }}
      hostname: {{ .Values.gateway.host | quote }}
      {{- end }}
      allowedRoutes:
        namespaces:
          from: Same
---
{{- if ((.Values.debugDashboard).enabled) }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "guild-forge.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "guild-forge.labels" . | nindent 4 }}
    app.kubernetes.io/component: debug-dashboard
spec:
  parentRefs:
    - name: {{ include "guild-forge.fullname" . }}
      namespace: {{ .Release.Namespace }}
  {{- if .Values.gateway.host }}
  hostnames:
    - {{ .Values.gateway.host | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /webhooks
      backendRefs:
        - name: {{ include "guild-forge.fullname" . }}-webhook-gateway
          port: 8080
    - backendRefs:
        - name: {{ include "guild-forge.fullname" . }}-debug-dashboard
          port: {{ ((.Values.debugDashboard).service).port | default 3333 }}
{{- end }}
{{- end }}
