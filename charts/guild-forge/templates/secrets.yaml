apiVersion: v1
kind: Secret
metadata:
  name: {{ include "guild-forge.fullname" . }}-secrets
  labels:
    {{- include "guild-forge.labels" . | nindent 4 }}
type: Opaque
stringData:
  anthropicApiKey: {{ .Values.secrets.anthropicApiKey | quote }}
  openaiApiKey: {{ .Values.secrets.openaiApiKey | quote }}
