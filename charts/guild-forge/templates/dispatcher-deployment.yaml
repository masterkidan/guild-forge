{{- if .Values.dispatcher.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "guild-forge.fullname" . }}-dispatcher
  labels:
    {{- include "guild-forge.labels" . | nindent 4 }}
    app.kubernetes.io/component: dispatcher
spec:
  replicas: {{ .Values.dispatcher.replicaCount }}
  selector:
    matchLabels:
      {{- include "guild-forge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dispatcher
  template:
    metadata:
      labels:
        {{- include "guild-forge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dispatcher
    spec:
      containers:
        - name: dispatcher
          image: "{{ .Values.dispatcher.image.repository }}:{{ .Values.imageTag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: QUEUE_SERVICE_URL
              value: {{ include "guild-forge.queueServiceUrl" . | quote }}
            - name: REGISTRY_URL
              value: {{ include "guild-forge.registryUrl" . | quote }}
            - name: POLL_INTERVAL_MS
              value: {{ .Values.dispatcher.config.pollIntervalMs | quote }}
          resources:
            {{- toYaml .Values.dispatcher.resources | nindent 12 }}
{{- end }}
