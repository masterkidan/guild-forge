{{- if ((.Values.debugDashboard).enabled) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "guild-forge.fullname" . }}-debug-dashboard
  labels:
    {{- include "guild-forge.labels" . | nindent 4 }}
    app.kubernetes.io/component: debug-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "guild-forge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: debug-dashboard
  template:
    metadata:
      labels:
        {{- include "guild-forge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: debug-dashboard
    spec:
      containers:
        - name: debug-dashboard
          image: "{{ .Values.debugDashboard.image.repository }}:{{ .Values.imageTag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 3333
          env:
            - name: PORT
              value: "3333"
            - name: QUEUE_SERVICE_URL
              value: {{ include "guild-forge.queueServiceUrl" . | quote }}
            - name: REGISTRY_URL
              value: {{ include "guild-forge.registryUrl" . | quote }}
            - name: WEBHOOK_GATEWAY_URL
              value: {{ printf "http://%s-webhook-gateway:8080" (include "guild-forge.fullname" .) | quote }}
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "guild-forge.fullname" . }}-debug-dashboard
  labels:
    {{- include "guild-forge.labels" . | nindent 4 }}
    app.kubernetes.io/component: debug-dashboard
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.debugDashboard.service.port }}
      targetPort: http
      name: http
  selector:
    {{- include "guild-forge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: debug-dashboard
{{- end }}
