{{- if .Values.seedJob.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "guild-forge.fullname" . }}-manifests
  labels:
    {{- include "guild-forge.labels" . | nindent 4 }}
    app.kubernetes.io/component: seed-job
data:
  quartermaster.json: |
    {
      "apiVersion": "guild/v1", "kind": "Agent",
      "metadata": { "name": "quartermaster" },
      "spec": {
        "prompt": "You are The Quartermaster. Monitor sprint velocity, maintain the Gantt chart, predict slippage, and manage work assignment. When you receive a TICKET_CREATED or TICKET_UPDATED event, assess impact on sprint capacity and critical path. When you receive a SPRINT_STARTED event, auto-schedule tickets by ranking them (Impact * Urgency) - Effort. Respond with structured JSON actions.",
        "tools": [
          { "pattern": "jira.get_issue",     "autonomy": 3 },
          { "pattern": "jira.search_issues", "autonomy": 3 },
          { "pattern": "jira.update_issue",  "autonomy": 2 },
          { "pattern": "jira.create_issue",  "autonomy": 1 },
          { "pattern": "slack.post_message", "autonomy": 2 }
        ],
        "resources": { "limits": { "tokensPerInvocation": 4096, "maxActiveDuration": 120 } },
        "triggers": [
          { "type": "webhook", "source": "jira", "eventType": "TICKET_CREATED" },
          { "type": "webhook", "source": "jira", "eventType": "TICKET_UPDATED" },
          { "type": "webhook", "source": "jira", "eventType": "SPRINT_STARTED" },
          { "type": "cron", "schedule": "30 8 * * 1-5", "timezone": "America/Los_Angeles" }
        ]
      }
    }
  sentinel.json: |
    {
      "apiVersion": "guild/v1", "kind": "Agent",
      "metadata": { "name": "sentinel" },
      "spec": {
        "prompt": "You are The Sentinel. Guard code quality and developer wellbeing. On PR_OPENED, check if the PR meets quality gates (tests, lint). Block PRs that fail. On REVIEW_SUBMITTED, summarize review status. Monitor for burnout signals. Never block on refactoring needs — only block on safety violations. Respond with structured JSON actions.",
        "tools": [
          { "pattern": "github.get_pull_request",  "autonomy": 3 },
          { "pattern": "github.list_checks",       "autonomy": 3 },
          { "pattern": "github.create_review",     "autonomy": 2 },
          { "pattern": "github.request_changes",   "autonomy": 2 },
          { "pattern": "slack.post_message",       "autonomy": 2 }
        ],
        "resources": { "limits": { "tokensPerInvocation": 2048, "maxActiveDuration": 60 } },
        "triggers": [
          { "type": "webhook", "source": "github", "eventType": "PR_OPENED" },
          { "type": "webhook", "source": "github", "eventType": "PR_UPDATED" },
          { "type": "webhook", "source": "github", "eventType": "REVIEW_SUBMITTED" }
        ]
      }
    }
  ranger.json: |
    {
      "apiVersion": "guild/v1", "kind": "Agent",
      "metadata": { "name": "ranger" },
      "spec": {
        "prompt": "You are The Ranger. You patrol production. On ALERT_TRIGGERED, assess severity and decide: is this a P0 (Red Flare) or a warning? For P0s, immediately post to the incident channel and page on-call. For warnings, log and monitor. On INCIDENT_RESOLVED, invoke the Investigator. Redact PII from error traces before logging. Respond with structured JSON actions.",
        "tools": [
          { "pattern": "datadog.get_alert",         "autonomy": 3 },
          { "pattern": "datadog.get_logs",          "autonomy": 3 },
          { "pattern": "slack.post_message",        "autonomy": 3 },
          { "pattern": "pagerduty.trigger_incident","autonomy": 2 }
        ],
        "resources": { "limits": { "tokensPerInvocation": 2048, "maxActiveDuration": 60 } },
        "triggers": [
          { "type": "webhook", "source": "datadog", "eventType": "ALERT_TRIGGERED" },
          { "type": "webhook", "source": "datadog", "eventType": "INCIDENT_CREATED" },
          { "type": "webhook", "source": "datadog", "eventType": "INCIDENT_RESOLVED" }
        ]
      }
    }
  scribe.json: |
    {
      "apiVersion": "guild/v1", "kind": "Agent",
      "metadata": { "name": "scribe" },
      "spec": {
        "prompt": "You are The Scribe. You maintain the knowledge base. On PR_MERGED, check if architecture-impacting changes need an ADR. On SCHEDULED_TRIGGER (weekly), compile a chapter summary from recent activity. Answer questions about the codebase and decisions. Write clear, concise documentation. Respond with structured JSON actions.",
        "tools": [
          { "pattern": "github.get_pull_request", "autonomy": 3 },
          { "pattern": "github.get_commit",       "autonomy": 3 },
          { "pattern": "github.create_file",      "autonomy": 2 },
          { "pattern": "confluence.create_page",  "autonomy": 1 },
          { "pattern": "slack.post_message",      "autonomy": 2 }
        ],
        "resources": { "limits": { "tokensPerInvocation": 8192, "maxActiveDuration": 180 } },
        "triggers": [
          { "type": "webhook", "source": "github", "eventType": "PR_MERGED" },
          { "type": "cron", "schedule": "0 16 * * 5", "timezone": "America/Los_Angeles" }
        ]
      }
    }
  grandmaster.json: |
    {
      "apiVersion": "guild/v1", "kind": "Agent",
      "metadata": { "name": "grandmaster" },
      "spec": {
        "prompt": "You are The Grandmaster. You set strategy and oversee the entire engineering org. On SCHEDULED_TRIGGER (end of week), synthesize chapter summaries and capacity reports into a weekly strategic update. Issue edicts that flow down to all chapters. When receiving a COMMAND_RECEIVED event from leadership, translate it into actionable directives. Respond with structured JSON actions.",
        "tools": [
          { "pattern": "slack.post_message", "autonomy": 2 },
          { "pattern": "slack.get_messages", "autonomy": 3 },
          { "pattern": "jira.search_issues", "autonomy": 3 }
        ],
        "resources": { "limits": { "tokensPerInvocation": 8192, "maxActiveDuration": 300 } },
        "triggers": [
          { "type": "cron", "schedule": "0 16 * * 5", "timezone": "America/Los_Angeles" },
          { "type": "webhook", "source": "slack", "eventType": "COMMAND_RECEIVED" }
        ]
      }
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "guild-forge.fullname" . }}-seed-manifests
  labels:
    {{- include "guild-forge.labels" . | nindent 4 }}
    app.kubernetes.io/component: seed-job
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.seedJob.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "guild-forge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: seed-job
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-registry
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              echo "Waiting for registry..."
              until curl -sf {{ include "guild-forge.registryUrl" . }}/health > /dev/null; do
                echo "Registry not ready, retrying in 3s..."
                sleep 3
              done
              echo "Registry is ready."
      containers:
        - name: seed
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              REGISTRY={{ include "guild-forge.registryUrl" . }}
              for f in /manifests/*.json; do
                name=$(cat "$f" | sed -n 's/.*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
                echo "Seeding $name from $f..."
                curl -sf -X PUT \
                  -H "Content-Type: application/json" \
                  -d "@${f}" \
                  "${REGISTRY}/agents/${name}" \
                  && echo " OK" || echo " FAILED"
              done
          volumeMounts:
            - name: manifests
              mountPath: /manifests
      volumes:
        - name: manifests
          configMap:
            name: {{ include "guild-forge.fullname" . }}-manifests
{{- end }}
